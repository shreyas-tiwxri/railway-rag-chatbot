<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Railway Document Enquiry</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171b;
    --panel-raised: #1b1f24;
    --border: #2a2e35;
    --amber: #ffb000;
    --amber-dim: #8a6200;
    --green: #3ddc97;
    --text: #e8e6e1;
    --text-muted: #8b92a0;
    --mono: ui-monospace, "SFMono-Regular", "Courier New", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---- Header: departure-board style ---- */
  .board-header {
    background: var(--panel);
    border-bottom: 2px solid var(--amber-dim);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .board-title {
    font-family: var(--mono);
    letter-spacing: 0.08em;
    font-size: 13px;
    color: var(--amber);
    text-transform: uppercase;
  }

  .board-title small {
    display: block;
    color: var(--text-muted);
    font-size: 10px;
    letter-spacing: 0.15em;
    margin-top: 2px;
  }

  .status-line {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 1.6s ease-in-out infinite;
  }

  .status-dot.busy { background: var(--amber); box-shadow: 0 0 6px var(--amber); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* ---- Chat area ---- */
  .chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
  }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.05em;
    line-height: 1.8;
  }

  .empty-state .big {
    color: var(--amber);
    font-size: 14px;
    margin-bottom: 8px;
    display: block;
  }

  .msg-row { display: flex; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.bot { justify-content: flex-start; }

  .bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 3px;
    font-size: 14px;
    line-height: 1.55;
    position: relative;
    white-space: pre-wrap;
  }

  .msg-row.user .bubble {
    background: var(--panel-raised);
    border: 1px solid var(--amber-dim);
    border-right: 3px solid var(--amber);
  }

  .msg-row.bot .bubble {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--green);
  }

  .bubble .meta {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .bubble .mode-tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 9px;
    margin-left: 6px;
    border: 1px solid currentColor;
  }
  .mode-table { color: var(--amber); }
  .mode-semantic { color: var(--green); }
  .mode-both { color: #7fb3ff; }

  .thinking {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--amber);
    letter-spacing: 0.05em;
  }

  .thinking::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
    100% { content: ''; }
  }

  /* ---- Input area: ticket-counter style ---- */
  .input-bar {
    border-top: 2px solid var(--amber-dim);
    background: var(--panel);
    padding: 14px 16px;
    display: flex;
    justify-content: center;
  }

  .input-inner {
    max-width: 780px;
    width: 100%;
    display: flex;
    gap: 10px;
  }

  #question-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 14px;
    border-radius: 3px;
    outline: none;
  }

  #question-input:focus {
    border-color: var(--amber);
  }

  #question-input::placeholder {
    color: var(--text-muted);
    letter-spacing: 0.03em;
  }

  #send-btn {
    background: var(--amber);
    color: #1a1300;
    border: none;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 0 20px;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
  }

  #send-btn:hover { background: #ffc633; }
  #send-btn:disabled { background: var(--amber-dim); cursor: not-allowed; }

  .chat-window::-webkit-scrollbar { width: 8px; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

  <div class="board-header">
    <div class="board-title">
      Indian Railways Document Enquiry
      <small>Freight &middot; Parcel &middot; Luggage Tariff System</small>
    </div>
    <div class="status-line">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">READY</span>
    </div>
  </div>

  <div class="chat-window" id="chat-window">
    <div class="empty-state" id="empty-state">
      <span class="big">NO ENQUIRIES YET</span>
      Ask about parcel rates, luggage scales, or freight circulars.<br>
      e.g. "What is the Scale-L rate for 40 kg over 620 km?"
    </div>
  </div>

  <div class="input-bar">
    <div class="input-inner">
      <input
        type="text"
        id="question-input"
        placeholder="TYPE YOUR QUERY..."
        autocomplete="off"
      />
      <button id="send-btn">Send</button>
    </div>
  </div>

<script>
  const API_URL = "/query"; // same origin as this page
  let conversationHistory = [];

  const chatWindow = document.getElementById("chat-window");
  const emptyState = document.getElementById("empty-state");
  const input = document.getElementById("question-input");
  const sendBtn = document.getElementById("send-btn");
  const statusDot = document.getElementById("status-dot");
  const statusText = document.getElementById("status-text");

  function setBusy(isBusy) {
    sendBtn.disabled = isBusy;
    input.disabled = isBusy;
    statusDot.classList.toggle("busy", isBusy);
    statusText.textContent = isBusy ? "SEARCHING RECORDS" : "READY";
  }

  function addMessage(role, text, meta) {
    if (emptyState) emptyState.remove();

    const row = document.createElement("div");
    row.className = "msg-row " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (meta) {
      const metaEl = document.createElement("div");
      metaEl.className = "meta";
      metaEl.innerHTML = meta;
      bubble.appendChild(metaEl);
    }

    const textEl = document.createElement("div");
    textEl.textContent = text;
    bubble.appendChild(textEl);

    row.appendChild(bubble);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return bubble;
  }

  function modeTag(mode) {
    const labels = { table: "TABLE LOOKUP", semantic: "SEMANTIC SEARCH", both: "HYBRID" };
    const cls = { table: "mode-table", semantic: "mode-semantic", both: "mode-both" };
    return `<span class="mode-tag ${cls[mode] || ""}">${labels[mode] || mode}</span>`;
  }

  async function sendQuery() {
    const question = input.value.trim();
    if (!question) return;

    addMessage("user", question);
    input.value = "";
    setBusy(true);

    const thinkingBubble = addMessage("bot", "");
    thinkingBubble.querySelector("div:last-child").innerHTML =
      '<span class="thinking">Consulting records</span>';

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, history: conversationHistory.slice(-3) }),
      });

      if (!res.ok) throw new Error("Server error: " + res.status);
      const data = await res.json();

      thinkingBubble.querySelector(".meta")?.remove();
      const metaEl = document.createElement("div");
      metaEl.className = "meta";
      metaEl.innerHTML = "Response " + modeTag(data.retrieval_mode);
      thinkingBubble.prepend(metaEl);

      thinkingBubble.querySelector("div:last-child").textContent = data.answer;
      conversationHistory.push({ question, answer: data.answer });
    } catch (err) {
      thinkingBubble.querySelector("div:last-child").textContent =
        "Could not reach the server. Is the API running?";
    } finally {
      setBusy(false);
      input.focus();
    }
  }

  sendBtn.addEventListener("click", sendQuery);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendQuery();
  });

  input.focus();
</script>

</body>
</html>
